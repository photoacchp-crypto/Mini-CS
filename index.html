<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Mini CS Pro | Knowledge Base Interaktif</title>
<style>
  /* ======================= RESET & VARIABLES ======================= */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }

  :root {
    --bg-page: #f1f5f9;
    --bg-sidebar: #ffffff;
    --bg-main: #f8fafc;
    --card-bg: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --border: #e2e8f0;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --btn-secondary: #f1f5f9;
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 10px 15px -5px rgba(0,0,0,0.05);
    --stat-bg: #ffffff;
  }

  body.dark {
    --bg-page: #0f172a;
    --bg-sidebar: #1e293b;
    --bg-main: #0f172a;
    --card-bg: #1e293b;
    --text-primary: #f1f5f9;
    --text-secondary: #cbd5e1;
    --border: #334155;
    --btn-secondary: #334155;
    --stat-bg: #1e293b;
  }

  body {
    background: var(--bg-page);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.5;
  }

  /* Layout */
  .app-layout {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 1.5rem;
    transition: transform 0.3s ease, width 0.3s;
    z-index: 20;
  }

  .sidebar.collapsed {
    transform: translateX(-100%);
    position: fixed;
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .sidebar-header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .menu-burger {
    background: none;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    color: var(--text-primary);
    display: none;
  }

  /* nav buttons */
  .nav-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .menu-btn {
    padding: 0.75rem 1rem;
    background: transparent;
    border: none;
    border-radius: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
  }

  .menu-btn i {
    margin-right: 10px;
    width: 24px;
    display: inline-block;
  }

  .menu-btn.active {
    background: var(--accent);
    color: white;
  }

  .menu-btn:hover:not(.active) {
    background: var(--btn-secondary);
    color: var(--text-primary);
  }

  /* Filter section collapsible */
  .filter-group {
    margin-top: 1.8rem;
    border-top: 1px solid var(--border);
    padding-top: 1.2rem;
  }

  .filter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    padding: 0.5rem 0;
    font-weight: 600;
    color: var(--text-primary);
  }

  .filter-header span:first-child {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .filter-content {
    margin-top: 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .filter-content select, .filter-content input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 0.9rem;
  }

  .filter-content select:focus, .filter-content input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* main area */
  .main-content {
    flex: 1;
    padding: 1.5rem;
    background: var(--bg-main);
    overflow-x: auto;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.8rem;
    flex-wrap: wrap;
  }

  .search-wrapper {
    flex: 1;
    position: relative;
    max-width: 500px;
  }

  .search-wrapper input {
    width: 100%;
    padding: 12px 40px 12px 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 40px;
    color: var(--text-primary);
    font-size: 0.95rem;
  }

  .reset-search {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 4px 8px;
  }

  .action-buttons {
    display: flex;
    gap: 10px;
  }

  .icon-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 16px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-primary);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .icon-btn i {
    font-size: 1rem;
  }

  /* stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--stat-bg);
    border-radius: 20px;
    padding: 1.2rem;
    border: 1px solid var(--border);
    text-align: center;
    box-shadow: var(--shadow);
  }

  .stat-card h2 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* cards layout */
  .cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
  }

  .card-item {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 1.2rem;
    border: 1px solid var(--border);
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .card-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
  }

  .card-item h3 {
    font-size: 1.2rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 0.5rem 0;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .badge {
    background: var(--btn-secondary);
    padding: 4px 8px;
    border-radius: 30px;
    font-size: 0.7rem;
  }

  .preview-btn {
    margin-top: 1rem;
    width: 100%;
    padding: 8px;
    background: var(--accent);
    border: none;
    border-radius: 30px;
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
  }

  .preview-btn:hover {
    background: var(--accent-hover);
  }

  /* modal */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 1rem;
  }

  .modal-card {
    background: var(--card-bg);
    max-width: 750px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 28px;
    padding: 1.5rem;
    position: relative;
  }

  .modal-card h2 {
    margin-bottom: 1rem;
    padding-right: 30px;
  }

  .close-modal {
    position: absolute;
    right: 20px;
    top: 15px;
    font-size: 28px;
    cursor: pointer;
    color: var(--text-secondary);
  }

  .copy-btn {
    background: var(--btn-secondary);
    border: none;
    padding: 6px 12px;
    border-radius: 40px;
    margin: 8px 0;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--text-primary);
  }

  hr {
    border-color: var(--border);
    margin: 12px 0;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      transform: translateX(-100%);
      width: 280px;
      z-index: 100;
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .menu-burger {
      display: block;
    }
    .main-content {
      padding: 1rem;
    }
    .top-bar {
      flex-direction: column;
      align-items: stretch;
    }
    .action-buttons {
      justify-content: flex-end;
    }
  }

  /* loading toast */
  .toast-msg {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: white;
    padding: 8px 18px;
    border-radius: 40px;
    font-size: 0.8rem;
    z-index: 200;
    opacity: 0.9;
  }

  /* ikon font */
  .material-symbols-outlined {
    font-size: 1.2rem;
    vertical-align: middle;
  }
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>📘 Mini CS Pro</h1>
      <button class="menu-burger" id="closeSidebarBtnMobile">✕</button>
    </div>
    <div class="nav-buttons">
      <button class="menu-btn active" data-view="dashboard">📊 Dashboard</button>
      <button class="menu-btn" data-view="kategori">📂 Kategori</button>
      <button class="menu-btn" data-view="grup">🗂️ Grup</button>
      <button class="menu-btn" data-view="favorit">⭐ Favorit</button>
    </div>

    <!-- Filter collapsible area -->
    <div class="filter-group">
      <div class="filter-header" id="filterToggle">
        <span>🔍 FILTER &nbsp;DATA</span>
        <span id="filterArrow">▼</span>
      </div>
      <div class="filter-content" id="filterContent">
        <select id="kategoriFilter"><option value="">Semua Kategori</option></select>
        <select id="grupFilter"><option value="">Semua Grup</option></select>
        <select id="statusFilter"><option value="">Semua Status</option></select>
        <select id="platformFilter"><option value="">Semua Platform</option></select>
        <select id="prioritasFilter"><option value="">Semua Prioritas</option></select>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="top-bar">
      <button class="menu-burger" id="openSidebarBtn" style="background:var(--card-bg); border:1px solid var(--border); padding:8px 12px; border-radius:30px;">☰</button>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Cari berdasarkan seluruh field (Judul, Kategori, Pertanyaan, Jawaban...)">
        <button class="reset-search" id="resetSearchBtn" title="Reset pencarian">✕</button>
      </div>
      <div class="action-buttons">
        <button class="icon-btn" id="refreshBtn">⟳ Refresh</button>
        <button class="icon-btn" id="themeToggleBtn">🌙 Dark</button>
      </div>
    </div>

    <section id="stats" class="stats-grid"></section>
    <section id="content" class="cards-container"></section>
  </main>
</div>

<div id="modal" class="modal">
  <div class="modal-card">
    <span class="close-modal" id="closeModalBtn">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  // ==================== Konfigurasi ====================
  const API_URL = "https://script.google.com/macros/s/AKfycbyrznbrQDzNXiPc0fJ0fXxClPGtGktm2iTMZbzhin-o6ZenmlZfIbUp4RoCuzTPp5zH/exec";
  let allData = [];
  let currentView = "dashboard";
  let isLoading = false;

  // DOM elements
  const sidebar = document.getElementById('sidebar');
  const openSidebarBtn = document.getElementById('openSidebarBtn');
  const closeSidebarBtnMobile = document.getElementById('closeSidebarBtnMobile');
  const searchInput = document.getElementById('searchInput');
  const resetSearchBtn = document.getElementById('resetSearchBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const themeToggleBtn = document.getElementById('themeToggleBtn');
  const statsDiv = document.getElementById('stats');
  const contentDiv = document.getElementById('content');
  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modalBody');
  const closeModalBtn = document.getElementById('closeModalBtn');

  // filter selects
  const kategoriFilter = document.getElementById('kategoriFilter');
  const grupFilter = document.getElementById('grupFilter');
  const statusFilter = document.getElementById('statusFilter');
  const platformFilter = document.getElementById('platformFilter');
  const prioritasFilter = document.getElementById('prioritasFilter');

  let currentTheme = localStorage.getItem('theme') || 'light';

  // Helper toast
  function showToast(msg, duration = 2000) {
    let toast = document.querySelector('.toast-msg');
    if(toast) toast.remove();
    toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
  }

  // Load data dari Google Sheets dengan error handling
  async function loadData(showLoadingMsg = false) {
    if(isLoading) return;
    isLoading = true;
    if(showLoadingMsg) showToast("🔄 Memuat data terbaru...");
    try {
      const response = await fetch(API_URL, { cache: "no-store" });
      const json = await response.json();
      allData = json.data || [];
      // normalize favorit: pastikan boolean
      allData = allData.map(item => ({
        ...item,
        Favorit: (String(item.Favorit).toUpperCase() === "TRUE") ? true : false
      }));
      populateFilters();
      renderStats();
      renderContent();
      if(showLoadingMsg) showToast(`✅ ${allData.length} data dimuat`);
    } catch(err) {
      console.error(err);
      showToast("Gagal memuat data, coba refresh manual", 3000);
    } finally {
      isLoading = false;
    }
  }

  // unique values helper
  function uniqueValues(field) {
    return [...new Set(allData.map(item => item[field]).filter(v => v && v.trim() !== ""))];
  }

  function populateFilters() {
    const kategoriSet = uniqueValues("Kategori");
    const grupSet = uniqueValues("Grup");
    const statusSet = uniqueValues("Status");
    const platformSet = uniqueValues("Platform");
    const prioritasSet = uniqueValues("Prioritas");

    fillSelect(kategoriFilter, kategoriSet, "Semua Kategori");
    fillSelect(grupFilter, grupSet, "Semua Grup");
    fillSelect(statusFilter, statusSet, "Semua Status");
    fillSelect(platformFilter, platformSet, "Semua Platform");
    fillSelect(prioritasFilter, prioritasSet, "Semua Prioritas");
  }

  function fillSelect(selectElement, optionsArray, defaultLabel) {
    const currentVal = selectElement.value;
    selectElement.innerHTML = `<option value="">${defaultLabel}</option>`;
    optionsArray.forEach(opt => {
      selectElement.innerHTML += `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`;
    });
    if(currentVal) selectElement.value = currentVal;
  }

  function escapeHtml(str) {
    if(!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  // Filter data dengan pencarian di semua field + filter select + favorit khusus
  function getFilteredData() {
    const searchTerm = searchInput.value.toLowerCase().trim();
    const kategoriVal = kategoriFilter.value;
    const grupVal = grupFilter.value;
    const statusVal = statusFilter.value;
    const platformVal = platformFilter.value;
    const prioritasVal = prioritasFilter.value;

    return allData.filter(item => {
      // Pencarian seluruh field (Judul, Kategori, Grup, Platform, Pertanyaan, semua jawaban)
      if(searchTerm) {
        const allText = [
          item.Judul, item.Kategori, item.Grup, item.Platform, item.Status, item.Prioritas,
          item.Pertanyaan, item["Jawaban 1"], item["Jawaban 2"], item["Jawaban 3"], item["Jawaban 4"]
        ].filter(Boolean).join(" ").toLowerCase();
        if(!allText.includes(searchTerm)) return false;
      }
      if(kategoriVal && item.Kategori !== kategoriVal) return false;
      if(grupVal && item.Grup !== grupVal) return false;
      if(statusVal && item.Status !== statusVal) return false;
      if(platformVal && item.Platform !== platformVal) return false;
      if(prioritasVal && item.Prioritas !== prioritasVal) return false;
      if(currentView === "favorit" && item.Favorit !== true) return false;
      return true;
    });
  }

  function renderStats() {
    const total = allData.length;
    const uniqueKategori = uniqueValues("Kategori").length;
    const uniqueGrup = uniqueValues("Grup").length;
    const uniquePlatform = uniqueValues("Platform").length;
    const totalFavorit = allData.filter(i => i.Favorit === true).length;
    statsDiv.innerHTML = `
      <div class="stat-card"><h2>${total}</h2><p>Total Data</p></div>
      <div class="stat-card"><h2>${uniqueKategori}</h2><p>Kategori</p></div>
      <div class="stat-card"><h2>${uniqueGrup}</h2><p>Grup</p></div>
      <div class="stat-card"><h2>${uniquePlatform}</h2><p>Platform</p></div>
      <div class="stat-card"><h2>${totalFavorit}</h2><p>Favorit</p></div>
    `;
  }

  function renderContent() {
    let filtered = getFilteredData();
    if(currentView === "kategori") {
      const map = new Map();
      filtered.forEach(item => {
        const kat = item.Kategori || "Tanpa Kategori";
        map.set(kat, (map.get(kat)||0) + 1);
      });
      contentDiv.innerHTML = Array.from(map.entries()).map(([k,v]) => `
        <div class="card-item"><h3>📁 ${escapeHtml(k)}</h3><div class="card-meta"><span class="badge">${v} template</span></div></div>
      `).join("");
      return;
    }
    if(currentView === "grup") {
      const map = new Map();
      filtered.forEach(item => {
        const grp = item.Grup || "Umum";
        map.set(grp, (map.get(grp)||0) + 1);
      });
      contentDiv.innerHTML = Array.from(map.entries()).map(([k,v]) => `
        <div class="card-item"><h3>🗂️ ${escapeHtml(k)}</h3><div class="card-meta"><span class="badge">${v} item</span></div></div>
      `).join("");
      return;
    }

    // tampilan card template (dashboard + favorit)
    if(filtered.length === 0) {
      contentDiv.innerHTML = `<div class="card-item" style="text-align:center;">⚠️ Tidak ada data sesuai filter</div>`;
      return;
    }
    contentDiv.innerHTML = filtered.map(item => `
      <div class="card-item">
        <h3>${escapeHtml(item.Judul || "Tanpa Judul")}</h3>
        <div class="card-meta">
          <span class="badge">📁 ${escapeHtml(item.Kategori || "-")}</span>
          <span class="badge">🗂️ ${escapeHtml(item.Grup || "-")}</span>
          <span class="badge">📱 ${escapeHtml(item.Platform || "-")}</span>
          <span class="badge">⚡ ${escapeHtml(item.Prioritas || "-")}</span>
        </div>
        <div class="card-meta"><span>${escapeHtml(item.Status || "Status?")}</span></div>
        <button class="preview-btn" data-item-idx="${item.idx || Math.random()}">👁️ Preview & Copy</button>
      </div>
    `).join("");

    // binding preview dinamis
    document.querySelectorAll('.preview-btn').forEach((btn, idx) => {
      btn.addEventListener('click', (e) => {
        const card = btn.closest('.card-item');
        const title = card.querySelector('h3')?.innerText || "";
        const foundItem = filtered.find(i => (i.Judul || "") === title);
        if(foundItem) showModal(foundItem);
        else showModal(filtered[idx % filtered.length]);
      });
    });
  }

  function showModal(item) {
    let html = `<h2>${escapeHtml(item.Judul || "Detail Template")}</h2>
    <p><strong>Kategori:</strong> ${escapeHtml(item.Kategori || "-")}</p>
    <p><strong>Grup:</strong> ${escapeHtml(item.Grup || "-")}</p>
    <p><strong>Status:</strong> ${escapeHtml(item.Status || "-")}</p>
    <p><strong>Platform:</strong> ${escapeHtml(item.Platform || "-")}</p>
    <p><strong>Prioritas:</strong> ${escapeHtml(item.Prioritas || "-")}</p>
    <hr>
    <p><strong>📌 Pertanyaan:</strong><br>${escapeHtml(item.Pertanyaan || "-")}</p>
    <hr>`;
    
    const jawabanKeys = ["Jawaban 1","Jawaban 2","Jawaban 3","Jawaban 4"];
    jawabanKeys.forEach(key => {
      if(item[key] && item[key].trim()) {
        html += `
          <div style="margin-top:12px;">
            <strong>${key}</strong>
            <button class="copy-btn" data-copy="${escapeHtml(item[key]).replace(/"/g, '&quot;')}">📋 Copy teks</button>
            <p>${escapeHtml(item[key])}</p>
          </div>
        `;
      }
    });
    modalBody.innerHTML = html;
    modal.style.display = "flex";
    
    // attach copy events after modal render
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const textToCopy = btn.getAttribute('data-copy') || btn.nextElementSibling?.innerText || "";
        navigator.clipboard.writeText(textToCopy).then(() => {
          showToast("✅ Berhasil disalin!", 1000);
        }).catch(() => alert("Gagal menyalin"));
        e.stopPropagation();
      });
    });
  }

  function closeModalFunc() {
    modal.style.display = "none";
  }

  // event listeners filter + search
  function attachFilterEvents() {
    const selects = [kategoriFilter, grupFilter, statusFilter, platformFilter, prioritasFilter];
    selects.forEach(sel => sel.addEventListener('change', () => renderContent()));
    searchInput.addEventListener('input', () => renderContent());
    resetSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      renderContent();
      showToast("Pencarian direset", 1000);
    });
  }

  // collapsible filter di sidebar
  const filterToggle = document.getElementById('filterToggle');
  const filterContentDiv = document.getElementById('filterContent');
  let filterCollapsed = false;
  filterToggle.addEventListener('click', () => {
    filterCollapsed = !filterCollapsed;
    filterContentDiv.style.display = filterCollapsed ? 'none' : 'flex';
    document.getElementById('filterArrow').innerHTML = filterCollapsed ? '▶' : '▼';
  });

  // sidebar responsive toggle
  function toggleSidebar(forceOpen) {
    if(window.innerWidth <= 768) {
      if(forceOpen) sidebar.classList.add('open');
      else sidebar.classList.toggle('open');
    } else {
      sidebar.classList.toggle('collapsed');
    }
  }
  openSidebarBtn.addEventListener('click', () => toggleSidebar(true));
  closeSidebarBtnMobile.addEventListener('click', () => sidebar.classList.remove('open'));
  window.addEventListener('resize', () => {
    if(window.innerWidth > 768) sidebar.classList.remove('open');
  });

  // theme handling
  function applyTheme(theme) {
    if(theme === 'dark') document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    themeToggleBtn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    localStorage.setItem('theme', theme);
  }
  themeToggleBtn.addEventListener('click', () => {
    const newTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
    applyTheme(newTheme);
  });
  // init theme
  if(currentTheme === 'dark') applyTheme('dark'); else applyTheme('light');

  // navigation menu
  document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      renderContent();
      if(window.innerWidth <= 768) sidebar.classList.remove('open');
    });
  });

  // manual refresh tanpa polling mengganggu
  refreshBtn.addEventListener('click', async () => {
    await loadData(true);
  });

  // modal close handlers
  closeModalBtn.addEventListener('click', closeModalFunc);
  window.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });

  // Initial load
  loadData(true);
  attachFilterEvents();
  // optional: tidak perlu auto polling untuk ringan, user bisa refresh manual
  // tetapi bisa tambahin refresh periodik setiap 5 menit (optional non mengganggu)
  setInterval(() => { loadData(false); }, 300000); // refresh di background tiap 5 menit tanpa toast mengganggu
</script>
</body>
</html>
