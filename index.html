<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Mini CS - Knowledge Base</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>📋 Mini CS</h1>
            <button class="close-sidebar" id="closeSidebar">✕</button>
        </div>

        <div class="sidebar-nav">
            <button class="menu-btn active" data-view="dashboard">
                <span class="icon">📊</span> Dashboard
            </button>
            <button class="menu-btn" data-view="kategori">
                <span class="icon">📂</span> Kategori
            </button>
            <button class="menu-btn" data-view="grup">
                <span class="icon">🗂️</span> Grup
            </button>
            <button class="menu-btn" data-view="favorit">
                <span class="icon">⭐</span> Favorit
            </button>
        </div>

        <!-- Collapsible Filters Section -->
        <div class="filters-section">
            <button class="filter-toggle" id="filterToggle">
                <span>🔍 Filter Data</span>
                <span class="toggle-icon">▼</span>
            </button>
            <div class="filters-panel" id="filtersPanel">
                <div class="filter-group">
                    <label>📁 Kategori</label>
                    <select id="kategoriFilter" class="filter-select">
                        <option value="">Semua</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🗂️ Grup</label>
                    <select id="grupFilter" class="filter-select">
                        <option value="">Semua</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📌 Status</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="">Semua</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>💻 Platform</label>
                    <select id="platformFilter" class="filter-select">
                        <option value="">Semua</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>⚡ Prioritas</label>
                    <select id="prioritasFilter" class="filter-select">
                        <option value="">Semua</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="theme-toggle" id="themeToggle">🌙 Dark Mode</button>
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh Data</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <div class="main-header">
            <button class="open-sidebar" id="openSidebar">☰</button>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari berdasarkan judul, kategori, grup, platform, pertanyaan, jawaban...">
                <button class="clear-search" id="clearSearch">✕</button>
            </div>
            <div class="header-actions">
                <span class="last-update" id="lastUpdate">-</span>
            </div>
        </div>

        <!-- Stats Dashboard -->
        <section id="stats" class="stats"></section>

        <!-- Content Area -->
        <section id="content" class="content-area"></section>
    </main>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <span id="closeModal">&times;</span>
        </div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script src="js/App.js"></script>
</body>
</html>
