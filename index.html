<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Creator Vault - Knowledge Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="logo">Creator Vault</div>
        <ul class="menu" id="sidebarMenu">
            <li class="menu-separator">━━ MENU ━━</li>
        </ul>
    </aside>

    <main class="main">
        <div class="header">
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Personal Knowledge Hub & Digital Library</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Cari di semua database... (Ctrl+K)" autocomplete="off">
        </div>

        <div id="content" class="content">
            <div class="loading-card">
                <div class="loading-spinner"></div>
                <h3>Memuat data...</h3>
            </div>
        </div>
    </main>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Detail Item</h3>
            <button class="close-modal" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button onclick="closeModal()" class="btn-secondary">Tutup</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="dashboard.js"></script>
<script src="sidebar.js"></script>
<script src="sheetViewer.js"></script>
<script src="search.js"></script>
<script src="app.js"></script>

<script>
    // Fallback jika ada yang error
    window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
    });
    
    // Inisialisasi saat DOM ready
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof initApp === 'function') {
            initApp();
        } else {
            console.error('initApp not found, loading fallback');
            loadFallback();
        }
    });
    
    async function loadFallback() {
        const content = document.getElementById('content');
        if (!content) return;
        
        try {
            const API_URL_FALLBACK = "https://script.google.com/macros/s/AKfycbyfDII52VgwAARpw0xsYg9ArPZo5O88Wg4taCdlHWgYvOOzzLv58wS4uQzXkw3eftT1/exec";
            const res = await fetch(`${API_URL_FALLBACK}?action=sheets`);
            const data = await res.json();
            
            let sheets = [];
            if (Array.isArray(data)) sheets = data;
            else if (data && Array.isArray(data.sheets)) sheets = data.sheets;
            
            content.innerHTML = `
                <div class="card">
                    <h2>📊 Dashboard</h2>
                    <div class="sheet-grid">
                        ${sheets.map(sheet => `
                            <div class="sheet-card" onclick="loadSheetFallback('${sheet}')">
                                <div class="sheet-icon">📄</div>
                                <div class="sheet-name">${sheet}</div>
                                <div class="sheet-hover">Klik untuk lihat</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        } catch(err) {
            content.innerHTML = `
                <div class="card error-card">
                    <h3>⚠️ Gagal Terhubung</h3>
                    <p>Pastikan link Google Apps Script benar dan memiliki akses publik.</p>
                    <button onclick="location.reload()" class="btn-primary">🔄 Refresh</button>
                </div>
            `;
        }
    }
    
    window.loadSheetFallback = async function(sheetName) {
        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading-card"><div class="loading-spinner"></div><p>Memuat data...</p></div>';
        
        try {
            const API_URL_FALLBACK = "https://script.google.com/macros/s/AKfycbyfDII52VgwAARpw0xsYg9ArPZo5O88Wg4taCdlHWgYvOOzzLv58wS4uQzXkw3eftT1/exec";
            const res = await fetch(`${API_URL_FALLBACK}?action=data&sheet=${encodeURIComponent(sheetName)}`);
            const data = await res.json();
            
            let rows = [];
            if (Array.isArray(data) && data.length > 0) {
                if (Array.isArray(data[0])) {
                    const headers = data[0];
                    const dataRows = data.slice(1);
                    rows = dataRows.map(row => {
                        const obj = {};
                        headers.forEach((h, i) => obj[h] = row[i] || "");
                        return obj;
                    });
                } else {
                    rows = data;
                }
            }
            
            if (rows.length === 0) {
                content.innerHTML = `<div class="card"><h2>${sheetName}</h2><p>Tidak ada data</p><button onclick="loadFallback()" class="btn-primary">Kembali</button></div>`;
                return;
            }
            
            let html = `<div class="card"><h2>📄 ${sheetName}</h2><div class="table-responsive"><table class="table"><thead><tr>`;
            const headers = Object.keys(rows[0]);
            headers.forEach(h => html += `<th>${h}</th>`);
            html += `</tr></thead><tbody>`;
            
            rows.forEach(row => {
                html += `<tr>`;
                headers.forEach(h => {
                    let val = row[h] || '-';
                    if (val.length > 50) val = val.substring(0, 50) + '...';
                    html += `<td>${val}</td>`;
                });
                html += `</tr>`;
            });
            
            html += `</tbody></table></div><button onclick="loadFallback()" class="btn-primary mt-3">← Kembali ke Dashboard</button></div>`;
            content.innerHTML = html;
            
        } catch(err) {
            content.innerHTML = `<div class="card error-card"><h3>Error</h3><p>${err.message}</p><button onclick="loadFallback()" class="btn-primary">Kembali</button></div>`;
        }
    };
</script>
</body>
</html>
