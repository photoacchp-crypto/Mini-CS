<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Mini CS - Customer Support Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-headset"></i>
                <h1>Mini CS</h1>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Main Navigation -->
        <nav class="main-nav">
            <button class="menu-btn" data-view="dashboard">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </button>
            <button class="menu-btn" data-view="kategori">
                <i class="fas fa-folder-tree"></i>
                <span>Kategori</span>
            </button>
            <button class="menu-btn" data-view="grup">
                <i class="fas fa-layer-group"></i>
                <span>Grup</span>
            </button>
            <button class="menu-btn" data-view="favorit">
                <i class="fas fa-star"></i>
                <span>Favorit</span>
            </button>
        </nav>

        <!-- Filter Section (Collapsible) -->
        <div class="filters-section">
            <div class="filters-header" id="filtersToggle">
                <i class="fas fa-filter"></i>
                <span>Filter Data</span>
                <i class="fas fa-chevron-down" id="filtersIcon"></i>
            </div>
            <div class="filters-body" id="filtersBody">
                <div class="filter-group">
                    <label><i class="fas fa-tag"></i> Kategori</label>
                    <select id="kategoriFilter" class="filter-select">
                        <option value="">Semua Kategori</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-layer-group"></i> Grup</label>
                    <select id="grupFilter" class="filter-select">
                        <option value="">Semua Grup</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-circle-info"></i> Status</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="">Semua Status</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-mobile-alt"></i> Platform</label>
                    <select id="platformFilter" class="filter-select">
                        <option value="">Semua Platform</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-flag"></i> Prioritas</label>
                    <select id="prioritasFilter" class="filter-select">
                        <option value="">Semua Prioritas</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Theme Toggle -->
        <div class="theme-toggle-wrapper">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
                <span>Dark Mode</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <div class="main-header">
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="search-wrapper">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Cari berdasarkan judul, kategori, grup, platform, pertanyaan, jawaban...">
                    <button class="search-clear" id="searchClear" style="display: none;">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <span class="last-update" id="lastUpdate"></span>
            </div>
        </div>

        <!-- Stats Dashboard -->
        <div class="stats-grid" id="stats"></div>

        <!-- Content Area -->
        <div class="content-area" id="content"></div>
    </main>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span>Berhasil disalin!</span>
</div>

<script src="js/App.js"></script>
</body>
</html>
