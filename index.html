<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CS BT - Multi Platform ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s ease, color 0.2s;
        }

        /* ===== DARK MODE PREMIUM - Palet Malam Kontras Optimal ===== */
        body.dark {
            --bg-primary: #0a0e17;
            --bg-secondary: #0f1420;
            --bg-tertiary: #161c2c;
            --bg-card: #111725;
            --bg-sidebar: #0c111b;
            --bg-hover: #1a2235;
            --bg-input: #0f1422;
            
            --text-primary: #eef2ff;
            --text-secondary: #a5b4fc;
            --text-muted: #7c8db0;
            --text-accent: #cbd5e1;
            
            --accent-primary: #60a5fa;
            --accent-secondary: #a78bfa;
            --accent-tertiary: #f472b6;
            --accent-gradient: linear-gradient(135deg, #60a5fa 0%, #818cf8 50%, #c084fc 100%);
            --accent-glow: rgba(96, 165, 250, 0.2);
            
            --success: #34d399;
            --success-glow: rgba(52, 211, 153, 0.12);
            --warning: #fbbf24;
            --warning-glow: rgba(251, 191, 36, 0.12);
            --danger: #f87171;
            --danger-glow: rgba(248, 113, 113, 0.12);
            --info: #38bdf8;
            --info-glow: rgba(56, 189, 248, 0.12);
            --purple: #c084fc;
            --pink: #f472b6;
            --cyan: #22d3ee;
            
            --border: #1e2a3a;
            --border-light: #2d3a4e;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.6);
            --shadow-xl: 0 12px 40px rgba(0, 0, 0, 0.7);
            --shadow-glow: 0 0 20px rgba(96, 165, 250, 0.25);
        }

        /* ===== LIGHT MODE PREMIUM - Lembut & Elegan (tetap dipertahankan) ===== */
        body.light {
            --bg-primary: #f4f7fb;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f4f9;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-hover: #f1f5f9;
            --bg-input: #ffffff;
            
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --text-accent: #1e293b;
            
            --accent-primary: #0284c7;
            --accent-secondary: #4f46e5;
            --accent-tertiary: #db2777;
            --accent-gradient: linear-gradient(135deg, #0284c7 0%, #4f46e5 70%, #a855f7 100%);
            --accent-glow: rgba(2, 132, 199, 0.1);
            
            --success: #059669;
            --warning: #d97706;
            --danger: #e11d48;
            --info: #0284c7;
            --purple: #7c3aed;
            --pink: #db2777;
            --cyan: #0891b2;
            
            --border: #e2e8f0;
            --border-light: #cbd5e1;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 12px 40px rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 16px rgba(2, 132, 199, 0.12);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* LAYOUT */
        .app {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* SIDEBAR PREMIUM */
        .sidebar-premium {
            width: 300px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
        }

        .sidebar-premium.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-premium::-webkit-scrollbar { width: 4px; }
        .sidebar-premium::-webkit-scrollbar-track { background: transparent; }
        .sidebar-premium::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 10px; }

        .main-area {
            flex: 1;
            margin-left: 300px;
            transition: margin-left 0.3s;
            padding: 1.8rem 2rem;
        }

        .main-area.expanded {
            margin-left: 0;
        }

        /* LOGO AREA - gradasi premium */
        .logo-area {
            padding: 1.5rem 1.2rem 1rem;
            margin-bottom: 1rem;
            background: var(--accent-gradient);
            border-radius: 0 0 28px 28px;
            margin: 0 12px 20px 12px;
            box-shadow: var(--shadow-md);
        }
        .logo-area h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .logo-area p {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.5px;
        }

        /* NAV GROUP */
        .nav-group {
            margin: 0.5rem 0.8rem;
        }
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--bg-tertiary);
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 6px;
            border: 1px solid var(--border);
        }
        .nav-header:hover {
            background: var(--accent-gradient);
            color: white;
            transform: translateX(4px);
        }
        .nav-header i:first-child { margin-right: 10px; width: 24px; }
        .nav-header span { flex: 1; font-size: 0.9rem; }
        .badge-count {
            background: var(--accent-gradient);
            color: white;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .nav-children {
            margin-left: 1rem;
            margin-top: 0.3rem;
            margin-bottom: 0.6rem;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .nav-children.open {
            display: flex;
        }
        .child-item {
            padding: 0.6rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
        }
        .child-item:hover {
            border-color: var(--accent-primary);
            background: var(--bg-hover);
            transform: translateX(4px);
        }
        .child-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .search-group {
            flex: 2;
            min-width: 240px;
            position: relative;
        }
        .search-group input {
            width: 100%;
            padding: 12px 40px 12px 18px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .search-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }
        .clear-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .icon-btn:hover {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        /* STATS CARDS - lebih segar di dark */
        .stats-master {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid var(--border);
            transition: 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
        }
        .stat-card:nth-child(1)::before { background: linear-gradient(90deg, #60a5fa, #818cf8); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, #34d399, #10b981); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .stat-card:nth-child(4)::before { background: linear-gradient(90deg, #f472b6, #ec4899); }
        .stat-card:nth-child(5)::before { background: linear-gradient(90deg, #c084fc, #a855f7); }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* DATA GRID */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card-item {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 1.3rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card-item:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--accent-primary);
        }
        .card-item h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .badge-sm {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        /* Badge warna - kontras dan eye-friendly di dark mode */
        .badge-kategori { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: white; }
        .badge-grup { background: linear-gradient(135deg, #34d399, #10b981); color: white; }
        .badge-prioritas-high { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
        .badge-prioritas-medium { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1e293b; }
        .badge-prioritas-low { background: linear-gradient(135deg, #94a3b8, #64748b); color: white; }
        .badge-platform { background: linear-gradient(135deg, #22d3ee, #06b6d4); color: white; }
        .badge-favorit { background: linear-gradient(135deg, #f472b6, #ec4899); color: white; }
        
        .btn-preview {
            width: 100%;
            margin-top: 16px;
            background: var(--accent-gradient);
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-preview:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-glow);
        }

        /* MODAL PREMIUM */
        .modal-glass {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(14px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: var(--bg-card);
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 32px;
            padding: 1.8rem;
            position: relative;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-xl);
        }
        .copy-answer {
            background: var(--accent-gradient);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            margin-top: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .copy-answer:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* RESPONSIVE */
        @media (max-width: 780px) {
            .main-area { padding: 1rem; }
            .sidebar-premium { width: 280px; }
            .data-grid { grid-template-columns: 1fr; }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--bg-tertiary);
            border-radius: 24px;
        }
    </style>
</head>
<body class="dark">
<div class="app">
    <aside class="sidebar-premium" id="premiumSidebar">
        <div class="logo-area">
            <h2><i class="fas fa-moon-stars"></i> CS Pro</h2>
            <p>knowledge base · dark mode premium</p>
        </div>
        <div id="dynamicMenuContainer" style="flex:1; padding: 0 0.6rem;"></div>
        <div style="padding: 1rem; border-top: 1px solid var(--border); margin-top: auto; text-align: center; font-size: 0.7rem;">
            <i class="fas fa-sync-alt"></i> sync realtime
        </div>
    </aside>

    <main class="main-area" id="mainArea">
        <div class="top-bar">
            <button class="icon-btn" id="toggleSidebarBtn"><i class="fas fa-bars"></i> Menu</button>
            <div class="search-group">
                <input type="text" id="globalSearchField" placeholder="Cari judul, jawaban, kategori..." autocomplete="off">
                <span id="clearSearchBtn" class="clear-icon"><i class="fas fa-times-circle"></i></span>
            </div>
            <div class="action-buttons">
                <button class="icon-btn" id="refreshDataBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="icon-btn" id="themeModeBtn"><i class="fas fa-moon"></i> Dark</button>
            </div>
        </div>

        <div class="stats-master" id="statsContainer"></div>
        <div id="mainContentArea"></div>
    </main>
</div>

<div id="globalModal" class="modal-glass">
    <div class="modal-card">
        <span id="closeModalBtn" style="float: right; font-size: 28px; cursor: pointer;">&times;</span>
        <div id="modalBodyContent"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyrznbrQDzNXiPc0fJ0fXxClPGtGktm2iTMZbzhin-o6ZenmlZfIbUp4RoCuzTPp5zH/exec";
    let fullDataset = [];
    let activeFilters = { kategori: "", grup: "", platform: "", status: "", prioritas: "" };
    let searchKeyword = "";
    let currentView = "dashboard";

    const dynamicMenu = document.getElementById("dynamicMenuContainer");
    const mainContent = document.getElementById("mainContentArea");
    const statsDiv = document.getElementById("statsContainer");
    const searchInput = document.getElementById("globalSearchField");
    const clearSearchIcon = document.getElementById("clearSearchBtn");
    const refreshBtn = document.getElementById("refreshDataBtn");
    const themeBtn = document.getElementById("themeModeBtn");
    const toggleSidebar = document.getElementById("toggleSidebarBtn");
    const sidebar = document.getElementById("premiumSidebar");
    const mainArea = document.getElementById("mainArea");
    const modal = document.getElementById("globalModal");
    const modalBody = document.getElementById("modalBodyContent");
    const closeModalSpan = document.getElementById("closeModalBtn");

    const getUnique = (field) => [...new Set(fullDataset.map(item => item[field]).filter(v => v && v.trim() !== ""))].sort();

    async function fetchData(showToast = false) {
        try {
            const res = await fetch(API_URL);
            const json = await res.json();
            fullDataset = json.data || [];
            if(showToast) showNotification("✨ Data terbaru dimuat", "success");
            renderAll();
        } catch(err) {
            console.error(err);
            if(showToast) showNotification("⚠️ Gagal memuat data", "error");
        }
    }

    function showNotification(msg, type = "success") {
        const notif = document.createElement("div");
        notif.style.cssText = `position:fixed;bottom:24px;right:24px;background:${type === "success" ? "var(--success)" : "var(--danger)"};color:white;padding:12px 24px;border-radius:40px;z-index:1100;font-weight:500;box-shadow:var(--shadow-lg);animation:fadeInOut 2.5s ease;backdrop-filter:blur(4px);`;
        notif.innerHTML = `<i class="fas ${type === "success" ? "fa-check-circle" : "fa-exclamation-triangle"}"></i> ${msg}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }

    function renderAll() {
        renderStatsDashboard();
        buildDynamicSidebarMenus();
        renderContentCards();
    }

    function renderStatsDashboard() {
        const total = fullDataset.length;
        const totalKategori = getUnique("Kategori").length;
        const totalGrup = getUnique("Grup").length;
        const totalPlatform = getUnique("Platform").length;
        const favoritCount = fullDataset.filter(i => String(i.Favorit).toUpperCase() === "TRUE").length;
        statsDiv.innerHTML = `
            <div class="stat-card" data-stat-type="all"><div class="stat-number">${total}</div><div><i class="fas fa-database"></i> Total Data</div></div>
            <div class="stat-card" data-stat-type="kategori"><div class="stat-number">${totalKategori}</div><div><i class="fas fa-folder-tree"></i> Kategori</div></div>
            <div class="stat-card" data-stat-type="grup"><div class="stat-number">${totalGrup}</div><div><i class="fas fa-layer-group"></i> Grup</div></div>
            <div class="stat-card" data-stat-type="platform"><div class="stat-number">${totalPlatform}</div><div><i class="fas fa-globe"></i> Platform</div></div>
            <div class="stat-card" data-stat-type="favorit"><div class="stat-number">${favoritCount}</div><div><i class="fas fa-star"></i> Favorit</div></div>
        `;
        document.querySelectorAll(".stat-card").forEach(card => {
            card.addEventListener("click", () => {
                const type = card.dataset.statType;
                if(type === "favorit") { currentView = "favorit"; renderContentCards(); }
                else { currentView = "dashboard"; resetAllFilters(); renderContentCards(); }
            });
        });
    }

    function resetAllFilters() {
        activeFilters = { kategori: "", grup: "", platform: "", status: "", prioritas: "" };
        searchKeyword = "";
        if(searchInput) searchInput.value = "";
        renderContentCards();
        buildDynamicSidebarMenus();
    }

    function getFilteredData() {
        let data = [...fullDataset];
        if(searchKeyword.trim() !== "") {
            const kw = searchKeyword.toLowerCase();
            data = data.filter(item => Object.values(item).some(val => val && String(val).toLowerCase().includes(kw)));
        }
        if(activeFilters.kategori) data = data.filter(i => i.Kategori === activeFilters.kategori);
        if(activeFilters.grup) data = data.filter(i => i.Grup === activeFilters.grup);
        if(activeFilters.platform) data = data.filter(i => i.Platform === activeFilters.platform);
        if(activeFilters.status) data = data.filter(i => i.Status === activeFilters.status);
        if(activeFilters.prioritas) data = data.filter(i => i.Prioritas === activeFilters.prioritas);
        if(currentView === "favorit") data = data.filter(i => String(i.Favorit).toUpperCase() === "TRUE");
        return data;
    }

    function getBadgeClass(value, type) {
        if(type === "prioritas") {
            if(value === "High" || value === "Tinggi") return "badge-prioritas-high";
            if(value === "Medium" || value === "Sedang") return "badge-prioritas-medium";
            if(value === "Low" || value === "Rendah") return "badge-prioritas-low";
            return "badge-sm";
        }
        if(type === "kategori") return "badge-kategori";
        if(type === "grup") return "badge-grup";
        if(type === "platform") return "badge-platform";
        return "badge-sm";
    }

    function renderContentCards() {
        const filtered = getFilteredData();
        if(!filtered.length) {
            mainContent.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:48px;margin-bottom:16px;opacity:0.7;"></i><p>Tidak ada data sesuai filter</p></div>`;
            return;
        }
        mainContent.innerHTML = `<div class="data-grid">${filtered.map(item => `
            <div class="card-item">
                <h3><i class="fas fa-comment-dots" style="color:var(--accent-primary);"></i> ${escapeHtml(item.Judul || "Tanpa Judul")}</h3>
                <div class="badge-row">
                    <span class="badge-sm ${getBadgeClass(item.Kategori, 'kategori')}"><i class="fas fa-tag"></i> ${escapeHtml(item.Kategori || "-")}</span>
                    <span class="badge-sm ${getBadgeClass(item.Grup, 'grup')}"><i class="fas fa-users"></i> ${escapeHtml(item.Grup || "-")}</span>
                    <span class="badge-sm ${getBadgeClass(item.Prioritas, 'prioritas')}"><i class="fas fa-chart-line"></i> ${escapeHtml(item.Prioritas || "-")}</span>
                    <span class="badge-sm ${getBadgeClass(item.Platform, 'platform')}"><i class="fas fa-mobile-alt"></i> ${escapeHtml(item.Platform || "-")}</span>
                    ${String(item.Favorit).toUpperCase() === "TRUE" ? '<span class="badge-sm badge-favorit"><i class="fas fa-star"></i> Favorit</span>' : ''}
                </div>
                <p style="font-size:0.85rem; margin:10px 0; color:var(--text-secondary); line-height:1.4;">${escapeHtml((item.Pertanyaan || "").substring(0, 100))}${(item.Pertanyaan||"").length>100?"...":""}</p>
                <button class="btn-preview" data-item='${JSON.stringify(escapeJson(item))}'><i class="fas fa-eye"></i> Lihat & Salin Jawaban</button>
            </div>
        `).join("")}</div>`;
        
        document.querySelectorAll(".btn-preview").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const item = JSON.parse(btn.dataset.item);
                showModalDialog(item);
            });
        });
    }

    function showModalDialog(item) {
        let answersHtml = "";
        ["Jawaban 1","Jawaban 2","Jawaban 3","Jawaban 4"].forEach(ans => {
            if(item[ans]) {
                answersHtml += `
                    <div style="margin-top:16px; border-top:1px solid var(--border); padding-top:12px;">
                        <strong style="color:var(--accent-primary);">📌 ${ans}</strong>
                        <p style="margin:8px 0; background:var(--bg-tertiary); padding:12px; border-radius:16px; line-height:1.5;">${escapeHtml(item[ans])}</p>
                        <button class="copy-answer" data-clip="${escapeHtml(item[ans])}"><i class="far fa-copy"></i> Salin teks</button>
                    </div>
                `;
            }
        });
        modalBody.innerHTML = `
            <h2 style="background:var(--accent-gradient); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:8px;">✨ ${escapeHtml(item.Judul || "Detail Knowledge")}</h2>
            <div style="margin:16px 0; padding:12px; background:var(--bg-tertiary); border-radius:20px;">
                <p><strong>📂 Kategori:</strong> <span class="badge-sm ${getBadgeClass(item.Kategori, 'kategori')}">${item.Kategori || "-"}</span> &nbsp;| <strong>🗂️ Grup:</strong> <span class="badge-sm ${getBadgeClass(item.Grup, 'grup')}">${item.Grup || "-"}</span></p>
                <p><strong>🌐 Platform:</strong> ${item.Platform || "-"} | <strong>📌 Status:</strong> ${item.Status || "-"} | <strong>⚡ Prioritas:</strong> <span class="badge-sm ${getBadgeClass(item.Prioritas, 'prioritas')}">${item.Prioritas || "-"}</span></p>
            </div>
            <hr style="border-color:var(--border); margin:12px 0;"/>
            <p><strong><i class="fas fa-question-circle"></i> Pertanyaan:</strong></p>
            <p style="background:var(--bg-tertiary); padding:12px; border-radius:16px; margin:8px 0; line-height:1.5;">${escapeHtml(item.Pertanyaan || "-")}</p>
            ${answersHtml}
        `;
        modal.style.display = "flex";
        document.querySelectorAll(".copy-answer").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const textToCopy = btn.dataset.clip;
                navigator.clipboard.writeText(textToCopy);
                showNotification("✅ Jawaban tersalin", "success");
            });
        });
    }

    function buildDynamicSidebarMenus() {
        const configFields = [
            { key: "Kategori", icon: "fas fa-folder-tree", label: "📂 Kategori", color: "#60a5fa" },
            { key: "Grup", icon: "fas fa-layer-group", label: "🗂️ Grup", color: "#34d399" },
            { key: "Platform", icon: "fas fa-globe", label: "🌐 Platform", color: "#22d3ee" },
            { key: "Status", icon: "fas fa-flag-checkered", label: "📌 Status", color: "#fbbf24" },
            { key: "Prioritas", icon: "fas fa-exclamation-triangle", label: "⚡ Prioritas", color: "#f472b6" }
        ];
        let menuHTML = `<div style="margin-bottom:1rem;"><h4 style="padding:0 0.8rem; font-size:0.7rem; letter-spacing:1px; color:var(--text-muted);"><i class="fas fa-sliders-h"></i> FILTER CERDAS</h4></div>`;
        
        for(let cfg of configFields) {
            const uniqueValues = getUnique(cfg.key);
            if(uniqueValues.length === 0) continue;
            const currentActive = activeFilters[cfg.key.toLowerCase()] || "";
            menuHTML += `
                <div class="nav-group">
                    <div class="nav-header" data-group-header="${cfg.key}">
                        <i class="${cfg.icon}" style="color:${cfg.color}"></i>
                        <span>${cfg.label} <span class="badge-count">${uniqueValues.length}</span></span>
                        <i class="fas fa-chevron-down" style="font-size:0.8rem;"></i>
                    </div>
                    <div class="nav-children" data-children="${cfg.key}" id="children-${cfg.key}">
            `;
            uniqueValues.forEach(val => {
                const isActive = (currentActive === val);
                const activeStyle = isActive ? 'style="border-left: 4px solid var(--accent-primary); background:var(--bg-hover);"' : '';
                menuHTML += `
                    <div class="child-item" data-filter-type="${cfg.key.toLowerCase()}" data-filter-value="${escapeAttr(val)}" ${activeStyle}>
                        <span class="child-title"><i class="fas ${cfg.key === 'Kategori' ? 'fa-tag' : (cfg.key === 'Grup' ? 'fa-folder' : 'fa-filter')}" style="color:${cfg.color}"></i> ${escapeHtml(val)}</span>
                        <span class="preview-badge" data-preview-filter="${cfg.key.toLowerCase()}" data-value="${escapeAttr(val)}" style="font-size:0.7rem; background:${cfg.color}30; padding:2px 8px; border-radius:20px; cursor:pointer;"><i class="fas fa-search-plus"></i></span>
                    </div>
                `;
            });
            menuHTML += `</div></div>`;
        }
        
        menuHTML += `<div class="nav-group" style="margin-top: 12px;">
            <div class="nav-header" id="favoriteQuickHeader" style="background: linear-gradient(135deg, #f472b6, #ec4899); color:white;">
                <i class="fas fa-star"></i> <span>⭐ Favorit</span> <i class="fas fa-chevron-down"></i>
            </div>
            <div class="nav-children" id="favoriteQuickChildren">
                <div class="child-item" data-view-fav="true"><i class="fas fa-heart" style="color:#f472b6;"></i> Tampilkan hanya favorit</div>
                <div class="child-item" data-view-all="true"><i class="fas fa-list"></i> Semua data</div>
            </div>
        </div>`;
        
        dynamicMenu.innerHTML = menuHTML;
        
        document.querySelectorAll(".nav-header").forEach(header => {
            header.addEventListener("click", (e) => {
                e.stopPropagation();
                const parentGroup = header.closest(".nav-group");
                const childrenDiv = parentGroup.querySelector(".nav-children");
                if(childrenDiv) {
                    childrenDiv.classList.toggle("open");
                    const icon = header.querySelector(".fa-chevron-down");
                    if(icon) icon.style.transform = childrenDiv.classList.contains("open") ? "rotate(180deg)" : "rotate(0deg)";
                }
            });
        });
        
        document.querySelectorAll(".child-item[data-filter-type]").forEach(child => {
            const filterType = child.dataset.filterType;
            const filterVal = child.dataset.filterValue;
            child.addEventListener("click", (e) => {
                e.stopPropagation();
                if(filterType && filterVal) {
                    if(activeFilters[filterType] === filterVal) activeFilters[filterType] = "";
                    else activeFilters[filterType] = filterVal;
                    currentView = "dashboard";
                    renderContentCards();
                    buildDynamicSidebarMenus();
                }
            });
            const badgeSpan = child.querySelector(".preview-badge");
            if(badgeSpan) {
                badgeSpan.addEventListener("click", (ev) => {
                    ev.stopPropagation();
                    const ft = badgeSpan.dataset.previewFilter;
                    const fv = badgeSpan.dataset.value;
                    if(ft && fv) {
                        activeFilters[ft] = fv;
                        currentView = "dashboard";
                        renderContentCards();
                        buildDynamicSidebarMenus();
                    }
                });
            }
        });
        
        const favItem = document.querySelector("[data-view-fav='true']");
        if(favItem) favItem.addEventListener("click", () => { currentView = "favorit"; renderContentCards(); buildDynamicSidebarMenus(); });
        const allItem = document.querySelector("[data-view-all='true']");
        if(allItem) allItem.addEventListener("click", () => { currentView = "dashboard"; resetAllFilters(); renderContentCards(); buildDynamicSidebarMenus(); });
        
        document.querySelectorAll(".nav-children").forEach((ch,idx) => { if(idx===0) ch.classList.add("open"); });
    }
    
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function escapeAttr(str) { return String(str).replace(/"/g, '&quot;'); }
    function escapeJson(obj) { return JSON.parse(JSON.stringify(obj)); }
    
    searchInput.addEventListener("input", (e) => { searchKeyword = e.target.value; renderContentCards(); buildDynamicSidebarMenus(); });
    clearSearchIcon.addEventListener("click", () => { searchInput.value = ""; searchKeyword = ""; renderContentCards(); buildDynamicSidebarMenus(); showNotification("Pencarian dibersihkan", "success"); });
    refreshBtn.addEventListener("click", () => fetchData(true));
    themeBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
        const isDark = document.body.classList.contains("dark");
        themeBtn.innerHTML = isDark ? '<i class="fas fa-moon"></i> Dark' : '<i class="fas fa-sun"></i> Light';
    });
    toggleSidebar.addEventListener("click", () => { sidebar.classList.toggle("collapsed"); mainArea.classList.toggle("expanded"); });
    closeModalSpan.addEventListener("click", () => modal.style.display = "none");
    window.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    
    setInterval(() => { fetchData(false); }, 40000);
    fetchData(true);
</script>
</body>
</html>
