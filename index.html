<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Creator Vault - Knowledge Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="logo">Creator Vault</div>
        <ul class="menu" id="sidebarMenu">
            <li class="menu-separator">━━ MENU ━━</li>
        </ul>
    </aside>

    <main class="main">
        <div class="header">
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Personal Knowledge Hub & Digital Library</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Cari di semua database... (Ctrl+K)" autocomplete="off">
        </div>

        <div id="content" class="content">
            <div class="loading-card">
                <div class="loading-spinner"></div>
                <h3>Memuat data...</h3>
            </div>
        </div>
    </main>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Detail Item</h3>
            <button class="close-modal" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button onclick="closeModal()" class="btn-secondary">Tutup</button>
        </div>
    </div>
</div>

<script>
    // ========================================
    // KONFIGURASI - SATU-SATUNYA SUMBER DATA
    // ========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbymziyZ0ZS0syO0c8szOsE_nwCzQtTU07JlPFat0BYDey-OxiuqeSlyLvYlXqZ4gvdv/exec";
    
    // Global state
    let allSheetsData = {};
    let sheetsList = [];
    let currentSheet = null;
    let isLoading = false;
    let currentPage = 1;
    let currentFilter = "";
    let currentSearchKeyword = "";
    let searchTimeout;
    let currentData = [];
    let currentHeaders = [];
    const itemsPerPage = 20;
    
    // ========================================
    // API FUNCTIONS
    // ========================================
    async function getSheets() {
        try {
            const res = await fetch(`${API_URL}?action=sheets`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            console.log("Sheets from API:", data);
            
            if (Array.isArray(data)) return data;
            if (data && Array.isArray(data.sheets)) return data.sheets;
            if (data && Array.isArray(data.data)) return data.data;
            
            return [];
        } catch (error) {
            console.error("getSheets error:", error);
            return [];
        }
    }
    
    async function getSheetData(sheetName) {
        try {
            const res = await fetch(`${API_URL}?action=data&sheet=${encodeURIComponent(sheetName)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            console.log(`Data from ${sheetName}:`, data);
            
            // Convert 2D array to objects
            if (Array.isArray(data) && data.length > 0) {
                if (Array.isArray(data[0])) {
                    const headers = data[0];
                    const rows = data.slice(1);
                    return rows.map(row => {
                        const obj = {};
                        headers.forEach((header, idx) => {
                            obj[header] = row[idx] || "";
                        });
                        return obj;
                    });
                }
                return data;
            }
            
            return [];
        } catch (error) {
            console.error(`getSheetData error for ${sheetName}:`, error);
            return [];
        }
    }
    
    // ========================================
    // LOAD ALL DATA
    // ========================================
    async function loadAllData() {
        if (isLoading) return;
        isLoading = true;
        
        const content = document.getElementById('content');
        if (content) {
            content.innerHTML = `<div class="loading-card"><div class="loading-spinner"></div><h3>🔄 Mengambil data dari database...</h3><p>${API_URL.substring(0, 60)}...</p></div>`;
        }
        
        try {
            sheetsList = await getSheets();
            console.log("Sheets found:", sheetsList);
            
            if (!sheetsList || sheetsList.length === 0) {
                throw new Error("Tidak ada sheet yang ditemukan di database");
            }
            
            allSheetsData = {};
            for (const sheet of sheetsList) {
                const data = await getSheetData(sheet);
                allSheetsData[sheet] = data;
                console.log(`Loaded ${sheet}: ${data.length} items`);
            }
            
            await loadSidebar();
            await showDashboard();
            
        } catch (error) {
            console.error("Load error:", error);
            if (content) {
                content.innerHTML = `
                    <div class="card error-card">
                        <h3>⚠️ Gagal Terhubung ke Database</h3>
                        <p>Error: ${error.message}</p>
                        <p class="text-muted">URL API: ${API_URL}</p>
                        <button onclick="loadAllData()" class="btn-primary mt-3">🔄 Coba Lagi</button>
                        <button onclick="testConnection()" class="btn-secondary mt-3">🔍 Test Connection</button>
                    </div>
                `;
            }
        } finally {
            isLoading = false;
        }
    }
    
    async function testConnection() {
        try {
            const res = await fetch(`${API_URL}?action=sheets`);
            const data = await res.json();
            alert(`✅ Koneksi Berhasil!\n\nResponse: ${JSON.stringify(data).substring(0, 200)}\n\nSheets: ${Array.isArray(data) ? data.join(", ") : "Format response: " + typeof data}`);
        } catch (error) {
            alert(`❌ Koneksi Gagal!\n\nError: ${error.message}\n\nURL: ${API_URL}`);
        }
    }
    
    // ========================================
    // SIDEBAR
    // ========================================
    async function loadSidebar() {
        const menu = document.getElementById("sidebarMenu");
        if (!menu) return;
        
        const icons = {
            "Ebook": "📚", "Produk": "🛒", "Pelanggan": "👥", "TemplateChat": "💬",
            "Affiliate": "🔗", "PromptAI": "🤖", "IdeKonten": "💡", "Notes": "📝", "ReadingProgress": "📖", "Bookmarks": "🔖"
        };
        
        menu.innerHTML = `
            <li class="menu-item active" data-view="dashboard">
                <span>📊</span> Dashboard
            </li>
            <li class="menu-separator">━━ DATABASE ━━</li>
            ${sheetsList.map(sheet => `
                <li class="menu-item" data-sheet="${sheet.replace(/"/g, '&quot;')}">
                    <span>${icons[sheet] || "📄"}</span> ${escapeHtml(sheet)}
                </li>
            `).join('')}
            <li class="menu-separator">━━ ━━</li>
            <li class="menu-item" data-action="refresh">
                <span>🔄</span> Refresh Data
            </li>
        `;
        
        // Add event listeners
        document.querySelectorAll('.menu-item[data-view], .menu-item[data-sheet], .menu-item[data-action]').forEach(item => {
            item.addEventListener('click', async () => {
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                
                if (item.dataset.view === 'dashboard') {
                    await showDashboard();
                } else if (item.dataset.sheet) {
                    await loadSheet(item.dataset.sheet);
                } else if (item.dataset.action === 'refresh') {
                    await loadAllData();
                }
                
                // Close sidebar on mobile
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                }
            });
        });
    }
    
    // ========================================
    // DASHBOARD
    // ========================================
    async function showDashboard() {
        currentSheet = null;
        currentSearchKeyword = "";
        document.getElementById('pageTitle').innerHTML = '🏠 Dashboard';
        document.getElementById('pageSubtitle').innerHTML = 'Personal Knowledge Hub & Digital Library';
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = "";
        
        const totalItems = Object.values(allSheetsData).reduce((sum, data) => sum + (data?.length || 0), 0);
        
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="dashboard-welcome">
                <h1>🏦 Creator Vault</h1>
                <p>Selamat datang di pusat knowledge hub Anda</p>
                <div class="last-updated">🕐 Terakhir diperbarui: ${new Date().toLocaleString()}</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">${sheetsList.length}</div>
                    <div class="stat-label">Database Categories</div>
                    <div class="stat-icon">📁</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalItems}</div>
                    <div class="stat-label">Total Items</div>
                    <div class="stat-icon">📄</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">✓</div>
                    <div class="stat-label">Online</div>
                    <div class="stat-icon">🔗</div>
                </div>
            </div>
            
            <div class="card">
                <h3>📚 Semua Database</h3>
                <div class="sheet-grid">
                    ${sheetsList.map(sheet => {
                        const count = allSheetsData[sheet]?.length || 0;
                        const icon = getSheetIcon(sheet);
                        return `
                            <div class="sheet-card" onclick="loadSheet('${escapeHtml(sheet)}')">
                                <div class="sheet-icon">${icon}</div>
                                <div class="sheet-name">${escapeHtml(sheet)}</div>
                                <div class="sheet-count">📊 ${count} items</div>
                                <div class="sheet-hover">Klik untuk lihat detail →</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;
    }
    
    function getSheetIcon(sheetName) {
        const icons = {
            "Ebook": "📚", "Produk": "🛒", "Pelanggan": "👥", "TemplateChat": "💬",
            "Affiliate": "🔗", "PromptAI": "🤖", "IdeKonten": "💡", "Notes": "📝"
        };
        return icons[sheetName] || "📄";
    }
    
    // ========================================
    // SHEET VIEWER
    // ========================================
    async function loadSheet(sheetName) {
        currentSheet = sheetName;
        currentPage = 1;
        currentFilter = "";
        currentSearchKeyword = "";
        
        document.getElementById('pageTitle').innerHTML = `📄 ${escapeHtml(sheetName)}`;
        document.getElementById('pageSubtitle').innerHTML = `Menampilkan data dari database ${escapeHtml(sheetName)}`;
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = "";
        
        const data = allSheetsData[sheetName] || [];
        currentData = data;
        
        if (data.length > 0) {
            currentHeaders = Object.keys(data[0]);
        }
        
        renderSheetData();
    }
    
    function renderSheetData() {
        const content = document.getElementById('content');
        
        if (!currentData || currentData.length === 0) {
            content.innerHTML = `
                <div class="card empty-sheet">
                    <div class="empty-icon">📭</div>
                    <h2>📄 ${escapeHtml(currentSheet)}</h2>
                    <p>Tidak ada data di sheet ini.</p>
                    <button onclick="showDashboard()" class="btn-primary">← Kembali ke Dashboard</button>
                </div>
            `;
            return;
        }
        
        let filteredData = [...currentData];
        if (currentFilter) {
            filteredData = currentData.filter(row => 
                JSON.stringify(row).toLowerCase().includes(currentFilter.toLowerCase())
            );
        }
        
        const totalPages = Math.ceil(filteredData.length / itemsPerPage);
        const startIdx = (currentPage - 1) * itemsPerPage;
        const pageData = filteredData.slice(startIdx, startIdx + itemsPerPage);
        
        let html = `
            <div class="sheet-header">
                <div>
                    <h2>📄 ${escapeHtml(currentSheet)}</h2>
                    <div class="sheet-stats">📊 ${filteredData.length} item ditemukan ${currentFilter ? `(filter: "${currentFilter}")` : ""}</div>
                </div>
                <div class="sheet-actions">
                    <button onclick="showDashboard()" class="btn-secondary">← Dashboard</button>
                    <button onclick="exportSheetData()" class="btn-secondary">📥 Export CSV</button>
                </div>
            </div>
            
            <div class="card">
                <div class="filter-bar">
                    <input type="text" id="sheetFilter" placeholder="🔍 Filter data di sheet ini..." 
                           value="${escapeHtml(currentFilter)}" onkeyup="handleFilterKeyup(event)">
                    ${currentFilter ? `<button onclick="clearFilter()" class="btn-small">✖ Clear</button>` : ""}
                </div>
                
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                ${currentHeaders.map(col => `<th>${escapeHtml(col)}</th>`).join('')}
                                <th style="width:60px">Detail</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${pageData.map((row, idx) => renderTableRow(row, startIdx + idx)).join('')}
                        </tbody>
                    </table>
                </div>
        `;
        
        if (totalPages > 1) {
            html += `
                <div class="pagination">
                    <button onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>◀ Sebelumnya</button>
                    <span>Halaman ${currentPage} dari ${totalPages}</span>
                    <button onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Berikutnya ▶</button>
                </div>
            `;
        }
        
        html += `</div>`;
        content.innerHTML = html;
        
        const filterInput = document.getElementById("sheetFilter");
        if (filterInput) filterInput.focus();
    }
    
    function renderTableRow(row, index) {
        return `
            <tr>
                ${currentHeaders.map(col => {
                    const value = row[col] || '';
                    const truncated = value.length > 50 ? value.substring(0, 50) + '...' : value;
                    return `<td title="${escapeHtml(value)}">${escapeHtml(truncated)}</td>`;
                }).join('')}
                <td class="text-center">
                    <button class="btn-small" onclick="showDetail(${index})">👁️</button>
                </td>
            </tr>
        `;
    }
    
    function handleFilterKeyup(event) {
        currentFilter = event.target.value;
        currentPage = 1;
        renderSheetData();
    }
    
    function clearFilter() {
        currentFilter = "";
        currentPage = 1;
        renderSheetData();
    }
    
    function changePage(delta) {
        currentPage += delta;
        renderSheetData();
    }
    
    function showDetail(index) {
        let filteredData = [...currentData];
        if (currentFilter) {
            filteredData = currentData.filter(row => 
                JSON.stringify(row).toLowerCase().includes(currentFilter.toLowerCase())
            );
        }
        const item = filteredData[index];
        if (!item) return;
        
        const modal = document.getElementById('detailModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        
        modalTitle.innerHTML = `📋 Detail Item - ${escapeHtml(currentSheet)}`;
        
        let html = '';
        for (const [key, value] of Object.entries(item)) {
            html += `
                <div class="detail-row">
                    <div class="detail-label">${escapeHtml(key)}</div>
                    <div class="detail-value">
                        ${isUrl(value) ? `<a href="${value}" target="_blank" rel="noopener">${escapeHtml(value)}</a>` : 
                          value ? `<pre>${escapeHtml(String(value))}</pre>` : '-'}
                    </div>
                </div>
            `;
        }
        
        modalBody.innerHTML = html;
        modal.classList.add('active');
    }
    
    function exportSheetData() {
        if (!currentData || currentData.length === 0) {
            alert("Tidak ada data untuk diexport");
            return;
        }
        
        const headers = currentHeaders;
        const rows = currentData.map(row => headers.map(h => `"${String(row[h] || "").replace(/"/g, '""')}"`));
        const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
        
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${currentSheet}_export_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        
        showToast("✅ Data berhasil diexport");
    }
    
    // ========================================
    // SEARCH FUNCTION
    // ========================================
    function initSearch() {
        const input = document.getElementById('searchInput');
        if (!input) return;
        
        input.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const keyword = input.value.trim();
            currentSearchKeyword = keyword;
            
            if (keyword.length < 2) {
                if (currentSheet) {
                    loadSheet(currentSheet);
                } else {
                    showDashboard();
                }
                return;
            }
            
            searchTimeout = setTimeout(() => {
                performSearch(keyword);
            }, 400);
        });
    }
    
    async function performSearch(keyword) {
        const content = document.getElementById('content');
        content.innerHTML = `<div class="loading-card"><div class="loading-spinner"></div><h3>🔍 Mencari "${escapeHtml(keyword)}"...</h3></div>`;
        
        const results = [];
        for (const [sheet, data] of Object.entries(allSheetsData)) {
            for (const item of data) {
                let found = false;
                for (const val of Object.values(item)) {
                    if (val && String(val).toLowerCase().includes(keyword.toLowerCase())) {
                        found = true;
                        break;
                    }
                }
                if (found) {
                    results.push({ sheet, data: item });
                }
            }
        }
        
        if (results.length === 0) {
            content.innerHTML = `
                <div class="card empty-search">
                    <div class="empty-icon">🔍</div>
                    <p>Tidak ada hasil untuk "<strong>${escapeHtml(keyword)}</strong>"</p>
                    <button onclick="showDashboard()" class="btn-primary mt-3">← Kembali ke Dashboard</button>
                </div>
            `;
            return;
        }
        
        document.getElementById('pageTitle').innerHTML = `🔍 Hasil Pencarian`;
        document.getElementById('pageSubtitle').innerHTML = `Menemukan ${results.length} hasil untuk "${escapeHtml(keyword)}"`;
        
        let html = `<div class="card"><h3>🔍 Hasil Pencarian: "${escapeHtml(keyword)}"</h3><p class="text-muted">${results.length} item ditemukan</p>`;
        
        const grouped = {};
        results.forEach(r => {
            if (!grouped[r.sheet]) grouped[r.sheet] = [];
            grouped[r.sheet].push(r.data);
        });
        
        for (const [sheet, items] of Object.entries(grouped)) {
            html += `
                <div style="margin-top: 24px;">
                    <h4 style="color: var(--accent); margin-bottom: 12px;">📄 ${escapeHtml(sheet)} (${items.length})</h4>
                    <div class="sheet-grid" style="grid-template-columns: 1fr;">
                        ${items.slice(0, 5).map(item => {
                            const title = Object.values(item)[0] || "Tanpa Judul";
                            return `
                                <div class="sheet-card" onclick="showSearchDetail('${sheet}', '${escapeHtml(String(title))}')" style="cursor: pointer;">
                                    <div class="sheet-name">📌 ${escapeHtml(String(title).substring(0, 60))}</div>
                                    <div class="sheet-hover">Klik untuk lihat detail →</div>
                                </div>
                            `;
                        }).join('')}
                        ${items.length > 5 ? `<div class="text-muted" style="padding: 8px;">+ ${items.length - 5} hasil lainnya di ${escapeHtml(sheet)}</div>` : ''}
                    </div>
                </div>
            `;
        }
        
        html += `<div class="mt-4"><button onclick="showDashboard()" class="btn-primary">← Kembali ke Dashboard</button></div></div>`;
        content.innerHTML = html;
    }
    
    function showSearchDetail(sheet, title) {
        const data = allSheetsData[sheet];
        const item = data.find(d => String(Object.values(d)[0]) === title);
        if (!item) return;
        
        const modal = document.getElementById('detailModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        
        modalTitle.innerHTML = `📋 Detail dari ${escapeHtml(sheet)}`;
        
        let html = '';
        for (const [key, value] of Object.entries(item)) {
            html += `
                <div class="detail-row">
                    <div class="detail-label">${escapeHtml(key)}</div>
                    <div class="detail-value">
                        ${isUrl(value) ? `<a href="${value}" target="_blank" rel="noopener">${escapeHtml(value)}</a>` : 
                          value ? `<pre>${escapeHtml(String(value))}</pre>` : '-'}
                    </div>
                </div>
            `;
        }
        
        modalBody.innerHTML = html;
        modal.classList.add('active');
    }
    
    // ========================================
    // UTILITIES
    // ========================================
    function isUrl(str) {
        if (!str || typeof str !== 'string') return false;
        return str.startsWith('http://') || str.startsWith('https://') || 
               str.includes('drive.google.com') || str.includes('docs.google.com');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
    }
    
    // ========================================
    // MOBILE MENU
    // ========================================
    function initMobileMenu() {
        const btn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (btn) {
            btn.onclick = () => {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            };
        }
        
        if (overlay) {
            overlay.onclick = () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            };
        }
    }
    
    // ========================================
    // INIT
    // ========================================
    document.addEventListener('DOMContentLoaded', () => {
        initMobileMenu();
        initSearch();
        loadAllData();
        
        // Keyboard shortcut Ctrl+K
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    });
    
    // Global functions
    window.showDashboard = showDashboard;
    window.loadSheet = loadSheet;
    window.showDetail = showDetail;
    window.changePage = changePage;
    window.clearFilter = clearFilter;
    window.handleFilterKeyup = handleFilterKeyup;
    window.exportSheetData = exportSheetData;
    window.showSearchDetail = showSearchDetail;
    window.closeModal = closeModal;
    window.testConnection = testConnection;
</script>
</body>
</html>
