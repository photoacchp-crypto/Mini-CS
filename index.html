<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Online Cs Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background 0.2s ease, color 0.2s;
        }

        /* THEMES */
        body.dark {
            --bg-page: #0a0f1c;
            --bg-sidebar: #0f172ad9;
            --sidebar-solid: #0f172a;
            --card-bg: #111827;
            --card-border: #1f2a3e;
            --text-primary: #f0f3fa;
            --text-secondary: #9ca3af;
            --input-bg: #1e293b;
            --input-border: #334155;
            --hover-bg: #1e2a3a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --stat-bg: #111827cc;
            --modal-bg: #1e293b;
            --badge: #1e293b;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        body.light {
            --bg-page: #f1f5f9;
            --bg-sidebar: #ffffffea;
            --sidebar-solid: #ffffff;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --hover-bg: #f1f5f9;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --stat-bg: #ffffff;
            --modal-bg: #ffffff;
            --badge: #eef2ff;
            --shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
        }

        /* LAYOUT */
        .app {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* SIDEBAR PREMIUM */
        .sidebar-premium {
            width: 300px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(12px);
            background: var(--sidebar-solid);
            border-right: 1px solid var(--card-border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .sidebar-premium.collapsed {
            transform: translateX(-100%);
        }

        /* SCROLLBAR */
        .sidebar-premium::-webkit-scrollbar { width: 4px; }
        .sidebar-premium::-webkit-scrollbar-track { background: transparent; }
        .sidebar-premium::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .main-area {
            flex: 1;
            margin-left: 300px;
            transition: margin-left 0.3s;
            padding: 1.8rem 2rem;
        }

        .main-area.expanded {
            margin-left: 0;
        }

        /* HEADER SIDEBAR */
        .logo-area {
            padding: 1.5rem 1.2rem 1rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 1rem;
        }
        .logo-area h2 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* MENU HEADER (DYNAMIC FROM DB) */
        .nav-group {
            margin: 0.5rem 0.8rem;
        }
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1rem;
            background: var(--hover-bg);
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 6px;
        }
        .nav-header:hover {
            background: var(--accent);
            color: white;
        }
        .nav-header i:first-child { margin-right: 10px; width: 24px; }
        .nav-header span { flex: 1; font-size: 0.95rem; letter-spacing: -0.2px; }
        .badge-count {
            background: var(--accent);
            color: white;
            border-radius: 40px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .nav-children {
            margin-left: 1rem;
            margin-top: 0.3rem;
            margin-bottom: 0.8rem;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .nav-children.open {
            display: flex;
        }
        .child-item {
            padding: 0.6rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid transparent;
        }
        .child-item:hover {
            border-color: var(--accent);
            background: var(--hover-bg);
            transform: translateX(4px);
        }
        .child-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }
        .preview-badge {
            font-size: 0.7rem;
            background: var(--badge);
            padding: 2px 8px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* filter stats */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .search-group {
            flex: 2;
            min-width: 240px;
            position: relative;
        }
        .search-group input {
            width: 100%;
            padding: 12px 40px 12px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .clear-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        /* STATS CARDS */
        .stats-master {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--stat-bg);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid var(--card-border);
            transition: 0.2s;
            cursor: pointer;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
        }

        /* CARDS GRID */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.3rem;
        }
        .card-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid var(--card-border);
            transition: all 0.2s;
        }
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .badge-sm {
            background: var(--badge);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .btn-preview {
            width: 100%;
            margin-top: 16px;
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* MODAL */
        .modal-glass {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: var(--modal-bg);
            width: 90%;
            max-width: 680px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 32px;
            padding: 1.8rem;
            position: relative;
        }
        .copy-answer {
            background: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            margin-top: 8px;
            cursor: pointer;
        }
        @media (max-width: 780px) {
            .main-area { padding: 1rem; }
            .sidebar-premium { width: 280px; }
        }
        .refresh-spinner {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .favorite-star { color: #fbbf24; }
    </style>
</head>
<body class="dark">
<div class="app">
    <!-- SIDEBAR PREMIUM dengan Menu Header dari database (collapsible + filter otomatis) -->
    <aside class="sidebar-premium" id="premiumSidebar">
        <div class="logo-area">
            <h2><i class="fas fa-brain"></i> Mini CS</h2>
            <p style="font-size: 0.7rem; margin-top: 5px;">knowledge base · pintar</p>
        </div>

        <!-- MENU DINAMIS: Header dari field database (Kategori, Grup, Platform, Prioritas, Status) muncul otomatis -->
        <div id="dynamicMenuContainer" style="flex:1; padding: 0 0.6rem;">
            <!-- akan diisi javascript: menu header seperti Kategori, Grup, Platform, Status, Prioritas dll -->
        </div>

        <div style="padding: 1rem; border-top: 1px solid var(--card-border); margin-top: auto; font-size: 0.7rem; text-align: center;">
            <i class="fas fa-cloud-sync-alt"></i> realtime sync
        </div>
    </aside>

    <main class="main-area" id="mainArea">
        <div class="top-bar">
            <button class="icon-btn" id="toggleSidebarBtn"><i class="fas fa-bars"></i> Menu</button>
            <div class="search-group">
                <input type="text" id="globalSearchField" placeholder="Cari seluruh field (judul, jawaban, pertanyaan, kategori...)" autocomplete="off">
                <span id="clearSearchBtn" class="clear-icon"><i class="fas fa-times-circle"></i></span>
            </div>
            <div class="action-buttons">
                <button class="icon-btn" id="refreshDataBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="icon-btn" id="themeModeBtn"><i class="fas fa-moon"></i> Dark</button>
            </div>
        </div>

        <!-- STATISTICS DASHBOARD interaktif -->
        <div class="stats-master" id="statsContainer"></div>

        <!-- KONTEN UTAMA (dashboard data) -->
        <div id="mainContentArea"></div>
    </main>
</div>

<!-- MODAL PREMIUM -->
<div id="globalModal" class="modal-glass">
    <div class="modal-card">
        <span id="closeModalBtn" style="float: right; font-size: 28px; cursor: pointer;">&times;</span>
        <div id="modalBodyContent"></div>
    </div>
</div>

<script>
    // ---------- KONFIGURASI ----------
    const API_URL = "https://script.google.com/macros/s/AKfycbyrznbrQDzNXiPc0fJ0fXxClPGtGktm2iTMZbzhin-o6ZenmlZfIbUp4RoCuzTPp5zH/exec";
    let fullDataset = [];
    let activeFilters = {
        kategori: "",
        grup: "",
        platform: "",
        status: "",
        prioritas: ""
    };
    let searchKeyword = "";
    let currentView = "dashboard"; // "dashboard" atau bisa "favorit"

    // DOM elements
    const dynamicMenu = document.getElementById("dynamicMenuContainer");
    const mainContent = document.getElementById("mainContentArea");
    const statsDiv = document.getElementById("statsContainer");
    const searchInput = document.getElementById("globalSearchField");
    const clearSearchIcon = document.getElementById("clearSearchBtn");
    const refreshBtn = document.getElementById("refreshDataBtn");
    const themeBtn = document.getElementById("themeModeBtn");
    const toggleSidebar = document.getElementById("toggleSidebarBtn");
    const sidebar = document.getElementById("premiumSidebar");
    const mainArea = document.getElementById("mainArea");
    const modal = document.getElementById("globalModal");
    const modalBody = document.getElementById("modalBodyContent");
    const closeModalSpan = document.getElementById("closeModalBtn");

    // helper unik
    const getUnique = (field) => [...new Set(fullDataset.map(item => item[field]).filter(v => v && v.trim() !== ""))].sort();
    
    // load data dari spreadsheet
    async function fetchData(showToast = false) {
        try {
            const res = await fetch(API_URL);
            const json = await res.json();
            fullDataset = json.data || [];
            if(showToast) alert("✅ Data terbaru dimuat dari Kosan");
            renderAll();
        } catch(err) {
            console.error(err);
            if(showToast) alert("Gagal memuat data, cek koneksi");
        }
    }

    // Fungsi utama render semua: stat, menu sidebar (dengan header dari database), dan konten
    function renderAll() {
        renderStatsDashboard();
        buildDynamicSidebarMenus();  // <-- menu header dari database (collapsible + auto filter)
        renderContentCards();
    }

    // STATS lengkap & interaktif
    function renderStatsDashboard() {
        const total = fullDataset.length;
        const totalKategori = getUnique("Kategori").length;
        const totalGrup = getUnique("Grup").length;
        const totalPlatform = getUnique("Platform").length;
        const favoritCount = fullDataset.filter(i => String(i.Favorit).toUpperCase() === "TRUE").length;
        statsDiv.innerHTML = `
            <div class="stat-card" data-stat-type="all"><div class="stat-number">${total}</div><div>📊 Total Data</div></div>
            <div class="stat-card" data-stat-type="kategori"><div class="stat-number">${totalKategori}</div><div>📂 Kategori</div></div>
            <div class="stat-card" data-stat-type="grup"><div class="stat-number">${totalGrup}</div><div>🗂️ Grup</div></div>
            <div class="stat-card" data-stat-type="platform"><div class="stat-number">${totalPlatform}</div><div>📱 Platform</div></div>
            <div class="stat-card" data-stat-type="favorit"><div class="stat-number">${favoritCount}</div><div>⭐ Favorit</div></div>
        `;
        // klik stat: filter interaktif
        document.querySelectorAll(".stat-card").forEach(card => {
            card.addEventListener("click", (e) => {
                const type = card.dataset.statType;
                if(type === "favorit") {
                    currentView = "favorit";
                    renderContentCards();
                } else if(type === "all") {
                    currentView = "dashboard";
                    resetAllFilters();
                    renderContentCards();
                } else if(type === "kategori") {
                    currentView = "dashboard";
                    resetAllFilters();
                    renderContentCards();
                } else if(type === "grup") {
                    currentView = "dashboard";
                    resetAllFilters();
                    renderContentCards();
                } else {
                    currentView = "dashboard";
                    resetAllFilters();
                    renderContentCards();
                }
            });
        });
    }

    // reset filter & search
    function resetAllFilters() {
        activeFilters = { kategori: "", grup: "", platform: "", status: "", prioritas: "" };
        searchKeyword = "";
        if(searchInput) searchInput.value = "";
        renderContentCards();
        buildDynamicSidebarMenus(); // refresh highlight sidebar
    }

    // Filter data berdasarkan search + activeFilters + view
    function getFilteredData() {
        let data = [...fullDataset];
        // search all fields
        if(searchKeyword.trim() !== "") {
            const kw = searchKeyword.toLowerCase();
            data = data.filter(item => Object.values(item).some(val => val && String(val).toLowerCase().includes(kw)));
        }
        if(activeFilters.kategori) data = data.filter(i => i.Kategori === activeFilters.kategori);
        if(activeFilters.grup) data = data.filter(i => i.Grup === activeFilters.grup);
        if(activeFilters.platform) data = data.filter(i => i.Platform === activeFilters.platform);
        if(activeFilters.status) data = data.filter(i => i.Status === activeFilters.status);
        if(activeFilters.prioritas) data = data.filter(i => i.Prioritas === activeFilters.prioritas);
        if(currentView === "favorit") data = data.filter(i => String(i.Favorit).toUpperCase() === "TRUE");
        return data;
    }

    // RENDER konten utama: card modern
    function renderContentCards() {
        const filtered = getFilteredData();
        if(!filtered.length) {
            mainContent.innerHTML = `<div style="text-align:center;padding:3rem;"><i class="fas fa-search"></i> Tidak ada data sesuai filter</div>`;
            return;
        }
        mainContent.innerHTML = `<div class="data-grid">${filtered.map(item => `
            <div class="card-item">
                <h3><i class="fas fa-comment"></i> ${escapeHtml(item.Judul || "Tanpa Judul")}</h3>
                <div class="badge-row">
                    <span class="badge-sm"><i class="fas fa-tag"></i> ${item.Kategori || "-"}</span>
                    <span class="badge-sm"><i class="fas fa-users"></i> ${item.Grup || "-"}</span>
                    <span class="badge-sm"><i class="fas fa-chart-line"></i> ${item.Prioritas || "-"}</span>
                </div>
                <p style="font-size:0.85rem; margin:10px 0;">${(item.Pertanyaan || "").substring(0, 100)}${(item.Pertanyaan||"").length>100?"...":""}</p>
                <button class="btn-preview" data-preview='${JSON.stringify(escapeJson(item))}'><i class="fas fa-eye"></i> Preview & Salin Jawaban</button>
            </div>
        `).join("")}</div>`;
        // attach preview event
        document.querySelectorAll(".btn-preview").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const raw = btn.dataset.preview;
                showModalDialog(JSON.parse(raw));
            });
        });
    }

    // MODAL dengan copy
    function showModalDialog(item) {
        let answersHtml = "";
        ["Jawaban 1","Jawaban 2","Jawaban 3","Jawaban 4"].forEach(ans => {
            if(item[ans]) {
                answersHtml += `
                    <div style="margin-top:16px; border-top:1px solid var(--card-border); padding-top:12px;">
                        <strong>${ans}</strong>
                        <p style="margin:8px 0">${escapeHtml(item[ans])}</p>
                        <button class="copy-answer" data-clip="${escapeHtml(item[ans])}"><i class="far fa-copy"></i> Salin teks</button>
                    </div>
                `;
            }
        });
        modalBody.innerHTML = `
            <h2>${escapeHtml(item.Judul || "Detail Knowledge")}</h2>
            <p><strong>Kategori:</strong> ${item.Kategori || "-"} | <strong>Grup:</strong> ${item.Grup || "-"} | <strong>Platform:</strong> ${item.Platform || "-"} | <strong>Status:</strong> ${item.Status || "-"} | <strong>Prioritas:</strong> ${item.Prioritas || "-"}</p>
            <hr/>
            <p><strong><i class="fas fa-question-circle"></i> Pertanyaan:</strong></p>
            <p>${escapeHtml(item.Pertanyaan || "")}</p>
            ${answersHtml}
        `;
        modal.style.display = "flex";
        document.querySelectorAll(".copy-answer").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const textToCopy = btn.dataset.clip;
                navigator.clipboard.writeText(textToCopy);
                alert("✅ Jawaban tersalin ke clipboard");
            });
        });
    }

    // ========== SIDEBAR DINAMIS: MENU HEADER DARI DATABASE ==========
    // Membuat group berdasarkan field utama: Kategori, Grup, Platform, Status, Prioritas (Header otomatis)
    // Setiap header bersifat collapsible, dan setiap item di dalamnya mewakili nilai unik, 
    // saat diklik akan mengaktifkan filter dan menampilkan data terkait.
    function buildDynamicSidebarMenus() {
        const configFields = [
            { key: "Kategori", icon: "fas fa-folder-tree", label: "📂 Kategori" },
            { key: "Grup", icon: "fas fa-layer-group", label: "🗂️ Grup" },
            { key: "Platform", icon: "fas fa-globe", label: "🌐 Platform" },
            { key: "Status", icon: "fas fa-flag-checkered", label: "📌 Status" },
            { key: "Prioritas", icon: "fas fa-exclamation-triangle", label: "⚡ Prioritas" }
        ];
        let menuHTML = `<div style="margin-bottom:1rem;"><h4 style="padding:0 0.8rem; font-size:0.7rem; letter-spacing:1px;"><i class="fas fa-sliders-h"></i> FILTER CEPAT</h4></div>`;
        
        for(let cfg of configFields) {
            const uniqueValues = getUnique(cfg.key);
            if(uniqueValues.length === 0) continue;
            const currentActive = activeFilters[cfg.key.toLowerCase()] || "";
            // membuat header collapsible
            menuHTML += `
                <div class="nav-group">
                    <div class="nav-header" data-group-header="${cfg.key}">
                        <i class="${cfg.icon}"></i>
                        <span>${cfg.label} <span class="badge-count">${uniqueValues.length}</span></span>
                        <i class="fas fa-chevron-down" style="font-size:0.8rem;"></i>
                    </div>
                    <div class="nav-children" data-children="${cfg.key}" id="children-${cfg.key}">
            `;
            uniqueValues.forEach(val => {
                const isActive = (currentActive === val);
                const activeClass = isActive ? 'style="border-left: 3px solid var(--accent); background:var(--hover-bg);"' : '';
                menuHTML += `
                    <div class="child-item" data-filter-type="${cfg.key.toLowerCase()}" data-filter-value="${escapeAttr(val)}" ${activeClass}>
                        <span class="child-title"><i class="fas ${cfg.key === 'Kategori' ? 'fa-tag' : (cfg.key === 'Grup' ? 'fa-folder' : 'fa-filter')}"></i> ${escapeHtml(val)}</span>
                        <span class="preview-badge" data-preview-filter="${cfg.key.toLowerCase()}" data-value="${escapeAttr(val)}"><i class="fas fa-search-plus"></i></span>
                    </div>
                `;
            });
            menuHTML += `</div></div>`;
        }
        
        // tambahkan menu favorit quick
        menuHTML += `<div class="nav-group" style="margin-top: 12px;">
            <div class="nav-header" id="favoriteQuickHeader">
                <i class="fas fa-star"></i> <span>⭐ Favorit</span> <i class="fas fa-chevron-down"></i>
            </div>
            <div class="nav-children" id="favoriteQuickChildren">
                <div class="child-item" data-view-fav="true"><i class="fas fa-heart"></i> Tampilkan hanya favorit</div>
                <div class="child-item" data-view-all="true"><i class="fas fa-list"></i> Semua data</div>
            </div>
        </div>`;
        
        dynamicMenu.innerHTML = menuHTML;
        
        // ATTACH EVENT: collapsible semua header
        document.querySelectorAll(".nav-header").forEach(header => {
            header.addEventListener("click", (e) => {
                e.stopPropagation();
                const parentGroup = header.closest(".nav-group");
                const childrenDiv = parentGroup.querySelector(".nav-children");
                if(childrenDiv) {
                    childrenDiv.classList.toggle("open");
                    const icon = header.querySelector(".fa-chevron-down");
                    if(icon) icon.style.transform = childrenDiv.classList.contains("open") ? "rotate(180deg)" : "rotate(0deg)";
                }
            });
            // default buka sedikit biar user lihat (opsional)
            const children = header.parentElement?.querySelector(".nav-children");
            if(children && header.getAttribute("data-group-header") === "Kategori") children.classList.add("open");
        });
        
        // event filter dari child item
        document.querySelectorAll(".child-item[data-filter-type]").forEach(child => {
            const filterType = child.dataset.filterType; // kategori, grup, platform, status, prioritas
            const filterVal = child.dataset.filterValue;
            child.addEventListener("click", (e) => {
                e.stopPropagation();
                if(filterType && filterVal) {
                    // toggle filter jika sudah active
                    if(activeFilters[filterType] === filterVal) {
                        activeFilters[filterType] = "";
                    } else {
                        activeFilters[filterType] = filterVal;
                    }
                    currentView = "dashboard";
                    renderContentCards();
                    buildDynamicSidebarMenus(); // refresh highlight
                }
            });
            // badge preview bisa memicu filter juga (sama)
            const badgeSpan = child.querySelector(".preview-badge");
            if(badgeSpan) {
                badgeSpan.addEventListener("click", (ev) => {
                    ev.stopPropagation();
                    const ft = badgeSpan.dataset.previewFilter;
                    const fv = badgeSpan.dataset.value;
                    if(ft && fv) {
                        activeFilters[ft] = fv;
                        currentView = "dashboard";
                        renderContentCards();
                        buildDynamicSidebarMenus();
                    }
                });
            }
        });
        
        // favorit & all
        const favItem = document.querySelector("[data-view-fav='true']");
        if(favItem) favItem.addEventListener("click", () => { currentView = "favorit"; renderContentCards(); buildDynamicSidebarMenus(); });
        const allItem = document.querySelector("[data-view-all='true']");
        if(allItem) allItem.addEventListener("click", () => { currentView = "dashboard"; resetAllFilters(); renderContentCards(); buildDynamicSidebarMenus(); });
        
        // buka children pertama (kategori supaya visible)
        document.querySelectorAll(".nav-children").forEach((ch,idx) => { if(idx===0) ch.classList.add("open"); });
    }
    
    // helper escape
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function escapeAttr(str) { return String(str).replace(/"/g, '&quot;'); }
    function escapeJson(obj) { return JSON.parse(JSON.stringify(obj)); }
    
    // EVENT SEARCH
    searchInput.addEventListener("input", (e) => {
        searchKeyword = e.target.value;
        renderContentCards();
        buildDynamicSidebarMenus(); // untuk menjaga konsistensi highlight
    });
    clearSearchIcon.addEventListener("click", () => {
        searchInput.value = "";
        searchKeyword = "";
        renderContentCards();
        buildDynamicSidebarMenus();
    });
    refreshBtn.addEventListener("click", () => fetchData(true));
    themeBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
        const isDark = document.body.classList.contains("dark");
        themeBtn.innerHTML = isDark ? '<i class="fas fa-moon"></i> Dark' : '<i class="fas fa-sun"></i> Light';
    });
    toggleSidebar.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        mainArea.classList.toggle("expanded");
    });
    closeModalSpan.addEventListener("click", () => modal.style.display = "none");
    window.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    
    // auto refresh setiap 35 detik (tanpa mengganggu)
    setInterval(() => { fetchData(false); }, 35000);
    fetchData(true);
</script>
</body>
</html>
